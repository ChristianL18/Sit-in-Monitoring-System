<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>Student Management</title>
</head>
<body>
    <div class="nav">
            <img src="../images/ucmainccslogo-removebg-preview.png" class="logo" alt="">
            <h1 class="CCS">CCS Sit-in Monitoring System</h1>
            <div class="links">
                <a href="admin.html">Home</a>
                <a href="#" onclick="showSearchModal()">Search</a>
                <a href="Student.html">Student</a>
                <a href="SitIn.html">Sit-in</a>
                <a href="ViewRecord.html">View Sit-in Record</a>
                <a href="sit-in-reports.html">Sit-in Reports</a>
                <a href="feedbackreq.html">Feedbacks</a>
                <a href="reservationrequest.html">Reservation</a>
            </div>
            <button type="" onclick="showLogoutModal()">Log out</button>
            </div>


            <div class="student-section" id="studentSection">
            <div class="student-header">
                <h2>Student Information</h2>
                <div class="student-controls">
                    <div class="search-box">
                        <input type="text" id="studentSearch" placeholder="Search students..." onkeyup="searchStudents()">
                        <button class="btn-search">🔍</button>
                    </div>
                    <div class="student-buttons">
                        <button class="btn-add-student" onclick="showAddStudentModal()">Add Student</button>
                        <button class="btn-reset-all" onclick="resetAllStudents()">Reset All</button>
                    </div>
                </div>
            </div>
            <div class="student-table-container">
                <table class="student-table">
                    <thead>
                        <tr>
                            <th>ID Number</th>
                            <th>Name</th>
                            <th>Year Level</th>
                            <th>Course</th>
                            <th>Remaining Session</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="studentTableBody">
                        <!-- Student data will be populated here -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Logout Confirmation Modal -->
        <div class="modal-overlay" id="logoutOverlay"></div>
        <div class="modal" id="logoutModal">
            <h3>Confirm Logout</h3>
            <p>Are you sure you want to log out?</p>
            <div class="modal-buttons">
                <button onclick="confirmLogout()">Yes, Log Out</button>
                <button onclick="closeLogoutModal()">Cancel</button>
            </div>
        </div>

        <!-- Search Modal -->
        <div class="modal-overlay" id="searchOverlay"></div>
        <div class="modal" id="searchModal">
            <h3>Search User</h3>
            <input type="text" id="searchId" placeholder="Enter ID Number">
            <div class="modal-buttons">
                <button onclick="searchUser()">Search</button>
                <button onclick="closeSearchModal()">Cancel</button>
            </div>
            <div id="searchResult"></div>
        </div>

        <!-- Sit-in Modal -->
        <div class="modal-overlay" id="sitInOverlay"></div>
        <div class="modal" id="sitInModal">
            <h3>Sit-in Form</h3>
            <div class="form-group">
                <label>ID Number</label>
                <input type="text" id="sitInId" placeholder="Enter ID Number">
            </div>
            <div class="form-group">
                <label>Student Name</label>
                <input type="text" id="sitInName" placeholder="Student Name" readonly>
            </div>
            <div class="form-group">
                <label>Purpose</label>
                <input type="text" id="sitInPurpose" placeholder="Enter Purpose">
            </div>
            <div class="form-group">
                <label>Lab</label>
                <input type="text" id="sitInLab" placeholder="Lab Number">
            </div>
            <div class="form-group">
                <label>Remaining Session</label>
                <input type="text" id="sitInSession" placeholder="30" readonly>
            </div>
            <div class="modal-buttons">
                <button onclick="submitSitIn()">Submit</button>
                <button onclick="closeSitInModal()">Cancel</button>
            </div>
        </div>

        <!-- Add Student Modal -->
        <div class="modal-overlay" id="addStudentOverlay"></div>
        <div class="modal" id="addStudentModal">
            <h3>Add Student</h3>
            <div class="form-group">
                <label>ID Number</label>
                <input type="text" id="addIdNumber" placeholder="Enter ID Number">
            </div>
            <div class="form-group">
                <label>First Name</label>
                <input type="text" id="addFirstName" placeholder="First Name">
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" id="addLastName" placeholder="Last Name">
            </div>
            <div class="form-group">
                <label>Middle Name</label>
                <input type="text" id="addMiddleName" placeholder="Middle Name">
            </div>
            <div class="form-group">
                <label>Course</label>
                <select id="addCourse">
                    <option value="">Select Course</option>
                    <option value="BSCS">BSCS - Bachelor of Science in Computer Science</option>
                    <option value="BSIT">BSIT - Bachelor of Science in Information Technology</option>
                    <option value="BSBA">BSBA - Bachelor of Science in Business Administration</option>
                    <option value="BSHRM">BSHRM - Bachelor of Science in Hospitality Management</option>
                    <option value="BSED">BSED - Bachelor of Secondary Education</option>
                    <option value="BEED">BEED - Bachelor of Elementary Education</option>
                </select>
            </div>
            <div class="form-group">
                <label>Year Level</label>
                <select id="addCourseLevel">
                    <option value="">Select Year</option>
                    <option value="1st Year">1st Year</option>
                    <option value="2nd Year">2nd Year</option>
                    <option value="3rd Year">3rd Year</option>
                    <option value="4th Year">4th Year</option>
                </select>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="addEmail" placeholder="Email Address">
            </div>
            <div class="form-group">
                <label>Address</label>
                <input type="text" id="addAddress" placeholder="Address">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="addPassword" placeholder="Password">
            </div>
            <div class="modal-buttons">
                <button onclick="submitAddStudent()">Add Student</button>
                <button onclick="closeAddStudentModal()">Cancel</button>
            </div>
        </div>

        <!-- Edit Student Modal -->
        <div class="modal-overlay" id="editStudentOverlay"></div>
        <div class="modal" id="editStudentModal">
            <h3>Edit Student</h3>
            <input type="hidden" id="editIdNumber">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" id="editFirstName" placeholder="First Name">
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" id="editLastName" placeholder="Last Name">
            </div>
            <div class="form-group">
                <label>Middle Name</label>
                <input type="text" id="editMiddleName" placeholder="Middle Name">
            </div>
            <div class="form-group">
                <label>Course</label>
                <select id="editCourse">
                    <option value="">Select Course</option>
                    <option value="BSCS">BSCS - Bachelor of Science in Computer Science</option>
                    <option value="BSIT">BSIT - Bachelor of Science in Information Technology</option>
                    <option value="BSBA">BSBA - Bachelor of Science in Business Administration</option>
                    <option value="BSHRM">BSHRM - Bachelor of Science in Hospitality Management</option>
                    <option value="BSED">BSED - Bachelor of Secondary Education</option>
                    <option value="BEED">BEED - Bachelor of Elementary Education</option>
                </select>
            </div>
            <div class="form-group">
                <label>Year Level</label>
                <select id="editCourseLevel">
                    <option value="">Select Year</option>
                    <option value="1st Year">1st Year</option>
                    <option value="2nd Year">2nd Year</option>
                    <option value="3rd Year">3rd Year</option>
                    <option value="4th Year">4th Year</option>
                </select>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="editEmail" placeholder="Email Address">
            </div>
            <div class="form-group">
                <label>Address</label>
                <input type="text" id="editAddress" placeholder="Address">
            </div>
            <div class="modal-buttons">
                <button onclick="submitEditStudent()">Save Changes</button>
                <button onclick="closeEditStudentModal()">Cancel</button>
            </div>
        </div>
</body>
<script>
    // Search Modal Functions
    function showSearchModal() {
        document.getElementById("searchOverlay").classList.add("show");
        document.getElementById("searchModal").classList.add("show");
    }

    function closeSearchModal() {
        document.getElementById("searchOverlay").classList.remove("show");
        document.getElementById("searchModal").classList.remove("show");
        document.getElementById("searchResult").innerHTML = "";
        document.getElementById("searchId").value = "";
    }

    function searchUser() {
        const id = document.getElementById("searchId").value;
        
        fetch(`/api/search-user?id=${id}`)
            .then(res => res.json())
            .then(data => {
                const resultDiv = document.getElementById("searchResult");
                if (data.success) {
                    const user = data.user;
                    resultDiv.innerHTML = `
                        <div class="user-result">
                            <p><strong>ID:</strong> ${user.id_number}</p>
                            <p><strong>Name:</strong> ${user.first_name} ${user.last_name}</p>
                            <p><strong>Course:</strong> ${user.course}</p>
                            <p><strong>Year:</strong> ${user.course_level}</p>
                            <p><strong>Email:</strong> ${user.email}</p>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `<p style="color:red;">User not found</p>`;
                }
            });
    }

    // Logout Modal Functions
    function showLogoutModal() {
        document.getElementById("logoutOverlay").classList.add("show");
        document.getElementById("logoutModal").classList.add("show");
    }

    function closeLogoutModal() {
        document.getElementById("logoutOverlay").classList.remove("show");
        document.getElementById("logoutModal").classList.remove("show");
    }

    function logout() {
        fetch('/logout', { method: 'POST' })
        .then(r => r.json())
        .then(d => { if (d.success) window.location.href = d.redirectUrl; });
    }

    function confirmLogout() {
        closeLogoutModal();
        logout();
    }

    // Sit-in Modal Functions
    function showSitInModal() {
        document.getElementById("sitInOverlay").classList.add("show");
        document.getElementById("sitInModal").classList.add("show");
    }

    function closeSitInModal() {
        document.getElementById("sitInOverlay").classList.remove("show");
        document.getElementById("sitInModal").classList.remove("show");
        document.getElementById("sitInId").value = "";
        document.getElementById("sitInName").value = "";
        document.getElementById("sitInPurpose").value = "";
        document.getElementById("sitInLab").value = "";
    }

    function submitSitIn() {
        const studentId = document.getElementById("sitInId").value;
        const studentName = document.getElementById("sitInName").value;
        const purpose = document.getElementById("sitInPurpose").value;
        const lab = document.getElementById("sitInLab").value;
        
        if (!studentId || !purpose || !lab) {
            alert("Please fill in all required fields");
            return;
        }
        
        fetch('/api/sitin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ studentId, studentName, purpose, lab })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                alert("Sit-in recorded successfully!");
                closeSitInModal();
            } else {
                alert("Error: " + data.error);
            }
        });
    }

    // Auto-fill student name when ID is entered
    document.getElementById("sitInId").addEventListener("blur", function() {
        const id = this.value;
        if (id) {
            fetch(`/api/search-user?id=${id}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById("sitInName").value = data.user.first_name + " " + data.user.last_name;
                        document.getElementById("sitInSession").value = "30";
                    }
                });
        }
    });

    // Load students on page load
    function loadStudents() {
        fetch('/api/users')
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById("studentTableBody");
                if (data.length === 0) {
                    tbody.innerHTML = "<tr><td colspan='6'>No students found</td></tr>";
                } else {
                    tbody.innerHTML = data.map(student => `
                        <tr>
                            <td>${student.id_number}</td>
                            <td>${student.first_name} ${student.last_name}</td>
                            <td>${student.course_level}</td>
                            <td>${student.course}</td>
                            <td>${student.remaining_sessions !== undefined ? student.remaining_sessions : 30}</td>
                            <td>
                                <button class="btn-reset" onclick="resetStudentSession('${student.id_number}')">Reset Session</button>
                                <button class="btn-edit" onclick="editStudent('${student.id_number}')">Edit</button>
                                <button class="btn-delete" onclick="deleteStudent('${student.id_number}')">Delete</button>
                            </td>
                        </tr>
                    `).join('');
                }
            })
            .catch(err => {
                console.error('Error loading students:', err);
                const tbody = document.getElementById("studentTableBody");
                tbody.innerHTML = "<tr><td colspan='6'>Error loading students</td></tr>";
            });
    }

    // Search students
    function searchStudents() {
        const searchTerm = document.getElementById("studentSearch").value.toLowerCase();
        const rows = document.querySelectorAll("#studentTableBody tr");
        
        rows.forEach(row => {
            const idNumber = row.cells[0].textContent.toLowerCase();
            const name = row.cells[1].textContent.toLowerCase();
            const year = row.cells[2].textContent.toLowerCase();
            const course = row.cells[3].textContent.toLowerCase();
            
            if (idNumber.includes(searchTerm) || name.includes(searchTerm) || year.includes(searchTerm) || course.includes(searchTerm)) {
                row.style.display = "";
            } else {
                row.style.display = "none";
            }
        });
    }

    // Add Student Modal Functions
    function showAddStudentModal() {
        document.getElementById("addStudentOverlay").classList.add("show");
        document.getElementById("addStudentModal").classList.add("show");
        document.getElementById("addIdNumber").value = "";
        document.getElementById("addFirstName").value = "";
        document.getElementById("addLastName").value = "";
        document.getElementById("addMiddleName").value = "";
        document.getElementById("addCourse").value = "";
        document.getElementById("addCourseLevel").value = "";
        document.getElementById("addEmail").value = "";
        document.getElementById("addAddress").value = "";
        document.getElementById("addPassword").value = "";
    }

    function closeAddStudentModal() {
        document.getElementById("addStudentOverlay").classList.remove("show");
        document.getElementById("addStudentModal").classList.remove("show");
    }

    function submitAddStudent() {
        const id_number = document.getElementById("addIdNumber").value;
        const first_name = document.getElementById("addFirstName").value;
        const last_name = document.getElementById("addLastName").value;
        const middle_name = document.getElementById("addMiddleName").value;
        const course = document.getElementById("addCourse").value;
        const course_level = document.getElementById("addCourseLevel").value;
        const email = document.getElementById("addEmail").value;
        const address = document.getElementById("addAddress").value;
        const password = document.getElementById("addPassword").value;

        if (!id_number || !first_name || !last_name || !course || !course_level || !password) {
            alert("Please fill in all required fields");
            return;
        }

        fetch('/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id_number, first_name, last_name, middle_name, course, course_level, email, address, password })
        })
        .then(res => res.text())
        .then(data => {
            if (data.includes("Successful")) {
                alert("Student added successfully!");
                closeAddStudentModal();
                loadStudents();
            } else {
                alert("Error: " + data);
            }
        });
    }

    // Edit Student Modal Functions
    function editStudent(id) {
        fetch(`/api/search-user?id=${id}`)
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    const user = data.user;
                    document.getElementById("editIdNumber").value = user.id_number;
                    document.getElementById("editFirstName").value = user.first_name;
                    document.getElementById("editLastName").value = user.last_name;
                    document.getElementById("editMiddleName").value = user.middle_name || "";
                    document.getElementById("editCourse").value = user.course;
                    document.getElementById("editCourseLevel").value = user.course_level;
                    document.getElementById("editEmail").value = user.email || "";
                    document.getElementById("editAddress").value = user.address || "";
                    
                    document.getElementById("editStudentOverlay").classList.add("show");
                    document.getElementById("editStudentModal").classList.add("show");
                }
            });
    }

    function closeEditStudentModal() {
        document.getElementById("editStudentOverlay").classList.remove("show");
        document.getElementById("editStudentModal").classList.remove("show");
    }

    function submitEditStudent() {
        const id_number = document.getElementById("editIdNumber").value;
        const first_name = document.getElementById("editFirstName").value;
        const last_name = document.getElementById("editLastName").value;
        const middle_name = document.getElementById("editMiddleName").value;
        const course = document.getElementById("editCourse").value;
        const course_level = document.getElementById("editCourseLevel").value;
        const email = document.getElementById("editEmail").value;
        const address = document.getElementById("editAddress").value;

        if (!first_name || !last_name || !course || !course_level) {
            alert("Please fill in all required fields");
            return;
        }

        fetch(`/api/users/${id_number}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ first_name, last_name, middle_name, course, course_level, email, address })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                alert("Student updated successfully!");
                closeEditStudentModal();
                loadStudents();
            } else {
                alert("Error: " + data.error);
            }
        });
    }

    // Delete Student
    function deleteStudent(id) {
        if (confirm("Are you sure you want to delete this student?")) {
            fetch(`/api/users/${id}`, { method: 'DELETE' })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        alert("Student deleted successfully!");
                        loadStudents();
                    } else {
                        alert("Error: " + data.error);
                    }
                });
        }
    }

    // Reset single student session
    function resetStudentSession(id) {
        if (confirm("Reset this student's sessions to 30?")) {
            fetch(`/api/reset-sessions/${id}`, { method: 'PUT' })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        alert("Session reset successfully!");
                        loadStudents();
                    } else {
                        alert("Error: " + data.error);
                    }
                });
        }
    }

    // Reset All Students
    function resetAllStudents() {
        if (confirm("Are you sure you want to reset all students' sessions to 30?")) {
            fetch('/api/users')
                .then(res => res.json())
                .then(students => {
                    const resetPromises = students.map(student => 
                        fetch(`/api/reset-sessions/${student.id_number}`, { method: 'PUT' })
                    );
                    Promise.all(resetPromises)
                        .then(() => {
                            alert("All students' sessions have been reset to 30!");
                            loadStudents();
                        });
                });
        }
    }

    // Initialize
    loadStudents();
</script>
</html>
