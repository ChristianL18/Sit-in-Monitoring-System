<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
    <style>
        .software-badge {
            background: linear-gradient(135deg, #f0ebff, #e3dcff);
            color: #4D2FB2;
            border: 1px solid rgba(77, 47, 178, 0.15);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(77, 47, 178, 0.05);
        }
        
        .software-badge:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(77, 47, 178, 0.12);
            background: linear-gradient(135deg, #e3dcff, #d4ccff);
        }
        
        .no-software-text {
            color: #888;
            font-style: italic;
            font-size: 14px;
        }
    </style>
    <title>Reservation</title>
</head>
<body>
    <div class="nav">
        <img src="../images/ucmainccslogo-removebg-preview.png" class="logo" alt="">
        <h1 class="CCS">CCS Sit-in Monitoring System</h1>
        <div class="links">
            <div class="notification-dropdown">
                <a href="#" class="notification-toggle" onclick="toggleNotificationDropdown(event)">Notification ⏷</a>
                <div class="notification-menu" id="notificationMenu">
                    <div class="notification-menu-header">Announcements</div>
                    <div id="notificationList"></div>
                </div>
            </div>
            <a href="main.html">Home</a>
            <a href="software.html">Software</a>
            <a href="edit-profile.html">Edit Profile</a>
            <a href="history.html">History</a>
            <a href="reservation.html">Reservation</a>
        </div>
        <button type="" onclick="showLogoutModal()">Log out</button>
    </div>

    <main>
        <div class="reservemain">
            <div class="reservestudentinfo">
                <h2>Student Information</h2>
                <div class="reservestudentinfo-content">
                    <p><span>Student ID:</span> <span id="studentIdValue">Loading...</span></p>
                    <p><span>Name:</span> <span id="nameValue">Loading...</span></p>
                </div>
            </div>

            <div class="reserveform">
                <h2>Make a Reservation</h2>
                <form id="reservationForm">
                    <div class="formrow">
                        <div class="formgroup">
                            <label>Date</label>
                            <input type="date" id="reservationDate" required>
                        </div>
                        <div class="formgroup">
                            <label>Time In</label>
                            <select id="timeIn" required>
                                <option value="">-- Select Time --</option>
                                <option value="08:00 AM">08:00 AM</option>
                                <option value="09:00 AM">09:00 AM</option>
                                <option value="10:00 AM">10:00 AM</option>
                                <option value="11:00 AM">11:00 AM</option>
                                <option value="12:00 PM">12:00 PM</option>
                                <option value="01:00 PM">01:00 PM</option>
                                <option value="02:00 PM">02:00 PM</option>
                                <option value="03:00 PM">03:00 PM</option>
                                <option value="04:00 PM">04:00 PM</option>
                                <option value="05:00 PM">05:00 PM</option>
                                <option value="06:00 PM">06:00 PM</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="formrow">
                        <div class="formgroup">
                            <label>Laboratory</label>
                            <select id="labSelect" required onchange="loadPCs()">
                                <option value="">-- Select Lab --</option>
                                <option value="524">Room 524</option>
                                <option value="526">Room 526</option>
                                <option value="528">Room 528</option>
                                <option value="530">Room 530</option>
                                <option value="542">Room 542</option>
                                <option value="544">Room 544</option>
                            </select>
                        </div>
                        <div class="formgroup">
                            <label>Purpose</label>
                            <select id="purpose" required>
                                <option value="">-- Select Purpose --</option>
                                <option value="C Programming">C Programming</option>
                                <option value="Java">Java</option>
                                <option value="Python">Python</option>
                                <option value="Web Development">Web Development</option>
                                <option value="Database">Database</option>
                                <option value="Machine Learning">Machine Learning</option>
                                <option value="Data Structures">Data Structures</option>
                                <option value="Algorithm">Algorithm</option>
                                <option value="OOP">OOP</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>

                    <!-- Software Availability Display -->
                    <div class="software-availability-section" id="softwareAvailabilitySection" style="margin-bottom: 20px; display: none;">
                        <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #444;">Available Software in Lab</label>
                        <div id="softwareList" style="display: flex; flex-wrap: wrap; gap: 8px;">
                            <!-- Software badges will be injected here -->
                        </div>
                    </div>

                    <div class="pcselection">
                        <label>Select PC</label>
                        <button type="button" class="pcselectbtn" onclick="openPCModal()">
                            <span id="selectedPCText">Select PC</span>
                        </button>
                    </div>

                    <button type="submit" class="btnreserve">Reserve</button>
                </form>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="logoutOverlay"></div>
    <div class="modal" id="logoutModal">
        <h3>Confirm Logout</h3>
        <p>Are you sure you want to log out?</p>
        <div class="modal-buttons">
            <button onclick="confirmLogout()">Yes, Log Out</button>
            <button onclick="closeLogoutModal()">Cancel</button>
        </div>
    </div>

    <div class="modal-overlay" id="pcModalOverlay"></div>
    <div class="modal" id="pcModal">
        <h3>Select PC</h3>
        <div class="pc-modal-grid" id="pcModalGrid"></div>
        <div class="modal-buttons">
            <button onclick="closePCModal()">Cancel</button>
        </div>
    </div>

    <script>
        let selectedPC = null;
        let pcStatus = {};

        document.getElementById('reservationDate').min = new Date().toISOString().split('T')[0];

        fetch('/api/profile')
            .then(res => res.json())
            .then(data => {
                if (data.success && data.user) {
                    document.getElementById('studentIdValue').textContent = data.user.id_number || 'N/A';
                    document.getElementById('nameValue').textContent = (data.user.first_name + ' ' + data.user.last_name) || 'N/A';
                } else if (data.error === "Not authenticated") {
                    window.location.href = "/pages/Login.html";
                } else {
                    document.getElementById('studentIdValue').textContent = 'Error';
                    document.getElementById('nameValue').textContent = 'Error';
                }
            })
            .catch(err => {
                console.error('Error loading profile:', err);
                document.getElementById('studentIdValue').textContent = 'Error';
                document.getElementById('nameValue').textContent = 'Error';
            });

        function loadPCs() {
            selectedPC = null;
            document.getElementById('selectedPCText').textContent = 'Select PC';
            loadLabSoftware();
        }

        function loadLabSoftware() {
            const lab = document.getElementById('labSelect').value;
            const container = document.getElementById('softwareList');
            const section = document.getElementById('softwareAvailabilitySection');

            if (!lab) {
                section.style.display = 'none';
                container.innerHTML = '';
                return;
            }

            fetch(`/api/software/${lab}`)
                .then(res => res.json())
                .then(software => {
                    section.style.display = 'block';
                    container.innerHTML = '';

                    if (software.length === 0) {
                        container.innerHTML = '<span class="no-software-text">No software recorded for this laboratory.</span>';
                        return;
                    }

                    software.forEach(item => {
                        const span = document.createElement('span');
                        span.className = 'software-badge';
                        span.textContent = item.software_name;
                        container.appendChild(span);
                    });
                })
                .catch(err => {
                    console.error('Error loading laboratory software:', err);
                    section.style.display = 'block';
                    container.innerHTML = '<span class="no-software-text" style="color: red;">Failed to load software details.</span>';
                });
        }

        function openPCModal() {
            const lab = document.getElementById('labSelect').value;
            const date = document.getElementById('reservationDate').value;
            const timeIn = document.getElementById('timeIn').value;

            if (!lab) {
                alert('Please select a laboratory first');
                return;
            }
            if (!date) {
                alert('Please select a date first');
                return;
            }
            if (!timeIn) {
                alert('Please select a time first');
                return;
            }

            fetch(`/api/pcs?lab=${lab}&date=${date}&timeIn=${timeIn}`)
                .then(res => res.json())
                .then(data => {
                    pcStatus = data;
                    renderPCModal();
                    document.getElementById('pcModalOverlay').classList.add('show');
                    document.getElementById('pcModal').classList.add('show');
                })
                .catch(err => {
                    console.error('Error loading PCs:', err);
                    alert('Error loading PCs');
                });
        }

        function closePCModal() {
            document.getElementById('pcModalOverlay').classList.remove('show');
            document.getElementById('pcModal').classList.remove('show');
        }

        function renderPCModal() {
            const grid = document.getElementById('pcModalGrid');
            grid.innerHTML = '';

            for (let i = 1; i <= 50; i++) {
                const pcNum = 'PC' + i;
                const status = pcStatus[pcNum] || 'available';
                const pcDiv = document.createElement('div');
                pcDiv.className = `pc-box pc-${status} ${selectedPC === pcNum ? 'selected' : ''}`;
                
                if (status === 'unavailable') {
                    pcDiv.textContent = 'Occupied';
                    pcDiv.style.fontSize = '11px';
                } else {
                    pcDiv.textContent = pcNum;
                }
                
                pcDiv.onclick = () => selectPC(pcNum, status);
                grid.appendChild(pcDiv);
            }
        }

        function selectPC(pcNum, status) {
            if (status === 'unavailable') {
                alert('This PC is not available');
                return;
            }

            selectedPC = pcNum;
            document.getElementById('selectedPCText').textContent = pcNum;
            closePCModal();
        }

        document.getElementById('reservationForm').addEventListener('submit', function(e) {
            e.preventDefault();

            if (!selectedPC) {
                alert('Please select a PC');
                return;
            }

            const reservationData = {
                student_id: document.getElementById('studentIdValue').textContent,
                student_name: document.getElementById('nameValue').textContent,
                date: document.getElementById('reservationDate').value,
                time_in: document.getElementById('timeIn').value,
                lab: document.getElementById('labSelect').value,
                pc: selectedPC,
                purpose: document.getElementById('purpose').value
            };

            fetch('/api/reservation', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(reservationData)
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('Reservation submitted successfully!');
                    document.getElementById('reservationForm').reset();
                    selectedPC = null;
                    document.getElementById('selectedPCText').textContent = 'Select PC';
                } else {
                    alert('Error: ' + data.error);
                }
            })
            .catch(err => {
                console.error('Error submitting reservation:', err);
                alert('Failed to submit reservation');
            });
        });

        function showLogoutModal() {
            document.getElementById("logoutOverlay").classList.add("show");
            document.getElementById("logoutModal").classList.add("show");
        }

        function closeLogoutModal() {
            document.getElementById("logoutOverlay").classList.remove("show");
            document.getElementById("logoutModal").classList.remove("show");
        }

        function logout() {
            fetch('/logout', { method: 'POST' })
            .then(r => r.json())
            .then(d => { if (d.success) window.location.href = d.redirectUrl; });
        }

        function confirmLogout() {
            closeLogoutModal();
            logout();
        }

        function toggleNotificationDropdown(event) {
            event.preventDefault();
            event.stopPropagation();
            const dropdown = document.getElementById("notificationMenu");
            dropdown.classList.toggle("show");
            loadNotificationDropdown();
        }

        function loadNotificationDropdown() {
            const container = document.getElementById("notificationList");
            container.innerHTML = '<div class="notification-loading">Loading...</div>';
            
            fetch("/api/notifications")
                .then(res => res.json())
                .then(response => {
                    const announcements = response.announcements || [];
                    const notifications = response.notifications || [];
                    const all = [...announcements, ...notifications];
                    all.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                    
                    container.innerHTML = "";
                    if (all.length === 0) {
                        container.innerHTML = '<div class="notification-empty">No notifications</div>';
                        return;
                    }
                    all.slice(0, 5).forEach(item => {
                        const div = document.createElement("div");
                        div.className = "notification-item";
                        const title = item.title || item.description;
                        const desc = item.message || item.description;
                        div.innerHTML = `
                            <div class="notification-item-title">${title}</div>
                            <div class="notification-item-date">${new Date(item.created_at).toLocaleDateString()}</div>
                            <div class="notification-item-desc">${desc}</div>
                        `;
                        container.appendChild(div);
                    });
                })
                .catch(err => {
                    container.innerHTML = '<div class="notification-empty">Error loading</div>';
                });
        }

        document.addEventListener("click", function(event) {
            const dropdown = document.getElementById("notificationMenu");
            const toggle = document.querySelector(".notification-toggle");
            if (dropdown && toggle && !dropdown.contains(event.target) && !toggle.contains(event.target)) {
                dropdown.classList.remove("show");
            }
        });
    </script>
</body>
</html>
