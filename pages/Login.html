<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
  />
    <title>Document</title>
</head>
<body>
    <div class="nav">
        <img src="../images\ucmainccslogo-removebg-preview.png" class="logo" alt="">
        <h1 class="CCS">CCS Sit-in Monitoring System</h1>
        <div class="links">
            <a href="../index.html">Home</a>
            <a href="/pages/community.html">Community</a>
            <a href="about.html">About</a>
            <a href="Login.html">Log In</a>
            <a href="Registration.html">Register</a>
        </div>
    </div>


    <div class="login-main animate__animated animate__backInDown">
        <div class="login-container">
            <div class="computer-logo"> 
                <img src="/images/computer.svg" height="auto" width="500px">
            </div>
            <form class="login-form" id="loginForm">
                <h2 class="login-title">Log In</h2>
                <input type="text" id="idNumber" placeholder="ID Number" required>
                <input type="password" id="password" placeholder="Password" required>
                
                <button type="submit">Log in</button>
                <div id="errorMessage" class="hidden" style="color: red; margin-top: 10px;">
                    <span id="errorText"></span>
                </div>
                <button type="button" onclick="window.location.href='Registration.html'">Register</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                const idNumber = document.getElementById('idNumber').value;
                const password = document.getElementById('password').value;
                const errorDiv = document.getElementById('errorMessage');
                const errorText = document.getElementById('errorText');

                try {
                    const response = await fetch('/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ idNumber, password })
                    });

                    const data = await response.json();

                    if (data.success) {
                        window.location.href = data.redirectUrl;
                    } else {
                        errorText.textContent = data.error || 'Login failed';
                        errorDiv.classList.remove('hidden');
                    }
                } catch (err) {
                    errorText.textContent = 'An error occurred. Please try again.';
                    errorDiv.classList.remove('hidden');
                    console.error('Login error:', err);
                }
            });
    </script>
</body>
</html>
