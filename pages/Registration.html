<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration</title>
    <!-- FIXED: Removed the line break inside href -->
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="nav">
    <!-- FIXED: Changed backslash \ to forward slash / for web compatibility -->
    <img src="../images/ucmainccslogo-removebg-preview.png" class="logo" alt="">
    <h1 class="CCS">CCS Sit-in Monitoring System</h1>
    <div class="links">
        <a href="../index.html">Home</a>
        <a href="/pages/community.html">Community</a>
        <a href="about.html">About</a>
        <a href="/pages/Login.html">Log In</a>
        <a href="Registration.html">Register</a>
    </div>
</div>

<!-- ADDED: Wrapper divs to match your CSS structure -->
<div class="register-main">
    <div class="register-container">
        <!-- ADDED: class="register-form" -->
        <form id="registerForm" class="register-form">

            <!-- ADDED: Title that matches your CSS -->
            <h2 class="register-title">Registration</h2>

            <input type="text" name="id_number" placeholder="ID Number" required>

            <input type="text" name="first_name" placeholder="First Name" required>

            <input type="text" name="last_name" placeholder="Last Name" required>

            <input type="text" name="middle_name" placeholder="Middle Name" required>

                <select name="course" required>
                <option value="">Course</option>
                
                <option value="BSIT">Bachelor of Science Information technology(BSIT)</option>
                <option value="BSCS">Bachelor of Science Computer Science(BSCS)</option>
                <option value="BSIS">Bachelor of Science Information System(BSIS)</option>
                <option value="BSCE">Bachelor of Science Civil Engineering(BSCE)</option>
                <option value="BSCRIM">Bachelor of Science in Criminology(BSCRIM)</option>
                <option value="BSCA">Bachelor of Science Customs Administration(BSCA)</option>
                <option value="BSHM">Bachelor of Science Hospitality Management(BSHM)</option>
                <option value="BSN">Bachelor of Science in Nursing(BSN)</option>
                <option value="BSPSYCH">Bachelor of Science Abnornal Psychology(BSPSCYH)</option>
                <option value="BEED">Bachelor of Science of Education(BEED)</option>
                
            </select>

            <select name="course_level" required>
                <option value="">Course Level</option>
               
                <option value="1st Year">1st Year</option>
                <option value="2nd Year">2nd Year</option>
                <option value="3rd Year">3rd Year</option>
                <option value="4th Year">4th Year</option>
                <option value="4th Year">5ft Year</option>
            </select>

            <input type="text" name="address" placeholder="Address" required>

            <input type="email" name="email" placeholder="Email" required>

            <input type="password" name="password" placeholder="Password" required>
            <input type="password" name="confirm_password" placeholder="Confirm Password" required>

            <button type="submit">Register</button>

        </form>
    </div>
</div>
    <script>
        document.getElementById("registerForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const data = Object.fromEntries(formData);
            
            const response = await fetch("http://localhost:3000/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            
            const result = await response.text();
            
            if (result.includes("Successful")) {
                window.location.href = "/pages/Login.html";
            } else {
                alert("Registration failed. Please try again.");
            }
        });
    </script>
</body>
</html>
