<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration</title>
    <!-- FIXED: Removed the line break inside href -->
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="nav">
    <!-- FIXED: Changed backslash \ to forward slash / for web compatibility -->

        <a href="../index.html">Home</a>

<!-- ADDED: Wrapper divs to match your CSS structure -->
<div class="register-main">
    <div class="register-container">
        <!-- ADDED: class="register-form" -->
        <form action="http://localhost:3000/register" method="POST" class="register-form">
            
            <!-- ADDED: Title that matches your CSS -->
            <h2 class="register-title">Registration</h2>

            <input type="text" name="id_number" placeholder="ID Number" required>

            <input type="text" name="first_name" placeholder="First Name" required>

            <input type="text" name="last_name" placeholder="Last Name" required>

            <input type="text" name="middle_name" placeholder="Middle Name" required>

            <select name="course_level" required>
                <option value="">Course Level</option>
               
                <option value="1st Year">1st Year</option>
                <option value="2nd Year">2nd Year</option>
                <option value="3rd Year">3rd Year</option>
                <option value="4th Year">4th Year</option>
                <option value="4th Year">5ft Year</option>
            </select>
       
            <select name="course" required>
                <option value="">Course</option>
                
                <option value="BSIT">College of Allied Engineering</option>
                <option value="BSCS">College of Arts and Sciences</option>
                <option value="BSIS">College of Business and Accountancy</option>
                <option value="BSCE">College of Computer Studies</option>
                <option value="BSIT">College of Criminal Justice</option>
                <option value="BSCS">College of Customs Administration</option>
                <option value="BSIS">College of Hospitality Management</option>
                <option value="BSCE">College of Nursing</option>
                <option value="BSIT">College of Social Work</option>
                <option value="BSCS">College of Teacher Education</option>
                
            </select>

            <input type="text" name="address" placeholder="Address" required>

            <input type="email" name="email" placeholder="Email" required>

            <input type="password" name="password" placeholder="Password" required>
            <input type="password" name="confirm_password" placeholder="Confirm Password" required>

            <button type="submit">Register</button>

        </form>
    </div>
</div>

</body>
</html>
