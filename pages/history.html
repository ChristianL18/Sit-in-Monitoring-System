<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
    <title>Sit-in History</title>
</head>
<body>
    <div class="nav">
            <img
                src="../images/ucmainccslogo-removebg-preview.png"
                class="logo"
                alt=""
            />
            <h1 class="CCS">CCS Sit-in Monitoring System</h1>
            <div class="links">
                <a href="">Notification ⏷</a>
                <a href="main.html">Home</a>
                <a href="edit-profile.html">Edit Profile</a>
                <a href="history.html">History</a>
                <a href="">Reservation</a>
            </div>
            <button type="" onclick="showLogoutModal()">Log out</button>
        </div>

    <div class="history-section">
        <div class="history-header">
            <h2>Sit-in History (Successful Sit-in Transactions)</h2>
            <div class="history-controls">
                <div class="search-box">
                    <input type="text" id="historySearch" placeholder="Search history..." onkeyup="searchHistory()">
                    <button class="btn-search">🔍</button>
                </div>
            </div>
        </div>
        <div class="history-table-container">
            <table class="history-table">
                <thead>
                    <tr>
                        <th>Student ID</th>
                        <th>Name</th>
                        <th>Purpose</th>
                        <th>Lab</th>
                        <th>Time In</th>
                        <th>Time Out</th>
                        <th>Sessions Remaining</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="historyTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <!-- Feedback Modal -->
    <div class="modal-overlay" id="feedbackOverlay"></div>
    <div class="modal" id="feedbackModal">
        <h3>Submit Feedback</h3>
        <div class="form-group">
            <label>Rating</label>
            <div class="rating">
                <span onclick="setRating(1)" class="star">★</span>
                <span onclick="setRating(2)" class="star">★</span>
                <span onclick="setRating(3)" class="star">★</span>
                <span onclick="setRating(4)" class="star">★</span>
                <span onclick="setRating(5)" class="star">★</span>
            </div>
            <input type="hidden" id="ratingValue" value="0">
        </div>
        <div class="form-group">
            <label>Your Feedback</label>
            <textarea id="feedbackText" placeholder="Enter your feedback here..."></textarea>
        </div>
        <div class="modal-buttons">
            <button onclick="submitFeedback()">Submit</button>
            <button onclick="closeFeedbackModal()">Cancel</button>
        </div>
    </div>

    <script>
        function searchHistory() {
            const searchTerm = document.getElementById("historySearch").value.toLowerCase();
            const rows = document.querySelectorAll("#historyTableBody tr");
            
            rows.forEach(row => {
                const idNumber = row.cells[0].textContent.toLowerCase();
                const name = row.cells[1].textContent.toLowerCase();
                const purpose = row.cells[2].textContent.toLowerCase();
                const lab = row.cells[3].textContent.toLowerCase();
                
                if (idNumber.includes(searchTerm) || name.includes(searchTerm) || purpose.includes(searchTerm) || lab.includes(searchTerm)) {
                    row.style.display = "";
                } else {
                    row.style.display = "none";
                }
            });
        }

        function loadHistory() {
            fetch('/api/sitin')
                .then(res => res.json())
                .then(sitins => {
                    const tbody = document.getElementById("historyTableBody");
                    const completed = sitins.filter(s => s.status === 'completed');
                    
                    if (completed.length === 0) {
                        tbody.innerHTML = "<tr><td colspan='8'>No completed sit-in records found</td></tr>";
                    } else {
                        tbody.innerHTML = completed.map(sitin => {
                            const timeIn = new Date(sitin.time_in);
                            const timeOut = new Date(sitin.time_out);
                            
                            const formatDateTime = (date) => {
                                return date.toLocaleDateString('en-US', { 
                                    year: 'numeric', 
                                    month: 'short', 
                                    day: 'numeric',
                                    hour: '2-digit',
                                    minute: '2-digit'
                                });
                            };
                            
                            return `
                                <tr>
                                    <td>${sitin.student_id}</td>
                                    <td>${sitin.student_name}</td>
                                    <td>${sitin.purpose}</td>
                                    <td>${sitin.lab}</td>
                                    <td>${formatDateTime(timeIn)}</td>
                                    <td>${formatDateTime(timeOut)}</td>
                                    <td>${sitin.sessions}</td>
                                    <td><button class="btn-feedback" onclick="openFeedback('${sitin.student_id}', '${sitin.student_name}')">Feedback</button></td>
                                </tr>
                            `;
                        }).join('');
                    }
                })
                .catch(err => {
                    console.error('Error loading history:', err);
                    const tbody = document.getElementById("historyTableBody");
                    tbody.innerHTML = "<tr><td colspan='8'>Error loading history</td></tr>";
                });
        }

        function showLogoutModal() {
            if (confirm("Are you sure you want to log out?")) {
                fetch('/logout', { method: 'POST' })
                    .then(r => r.json())
                    .then(d => { if (d.success) window.location.href = d.redirectUrl; });
            }
        }

        function openFeedback(studentId, studentName) {
            document.getElementById("feedbackOverlay").classList.add("show");
            document.getElementById("feedbackModal").classList.add("show");
            setRating(0);
            document.getElementById("feedbackText").value = "";
        }

        function closeFeedbackModal() {
            document.getElementById("feedbackOverlay").classList.remove("show");
            document.getElementById("feedbackModal").classList.remove("show");
        }

        function setRating(rating) {
            document.getElementById("ratingValue").value = rating;
            const stars = document.querySelectorAll(".star");
            stars.forEach((star, index) => {
                star.style.color = index < rating ? "#FFD700" : "#ccc";
            });
        }

        function submitFeedback() {
            const feedbackText = document.getElementById("feedbackText").value;
            const rating = document.getElementById("ratingValue").value;

            if (rating === "0") {
                alert("Please select a rating");
                return;
            }
            if (!feedbackText.trim()) {
                alert("Please enter your feedback");
                return;
            }

            fetch('/api/feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ feedback_text: feedbackText, rating: parseInt(rating) })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert("Feedback submitted successfully!");
                    closeFeedbackModal();
                } else {
                    alert("Error: " + data.error);
                }
            });
        }

        window.onload = loadHistory;
    </script>
</body>
</html>
